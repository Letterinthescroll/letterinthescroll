<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" href="/media/images/Icon.png">
    <link rel="apple-touch-icon" href="/media/images/Icon.png">

    <!-- Open Graph / iMessage / Social Link Preview -->

    <meta property="og:site_name" content="A Letter in the Scroll">

    <meta property="og:url" content="https://www.aletterinthescroll.com/songs/song-detail.html">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Songs and Poems - A Letter in the Scroll">
    <meta name="twitter:description" content="Listen, reflect, read, and sing. Explore songs and poems that celebrate faith, hope, and the journey of the soul.">

    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/shabbat.css">
    <link rel="stylesheet" href="/css/mobile-overrides.css">
    <link rel="stylesheet" href="/css/song-detail-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&family=Noto+Serif+Hebrew:wght@400;500;600;700&family=Cinzel:wght@500;700&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="sd-body" data-enable-text-size="true" data-header-fallback="true">

    <!-- Header -->
    <div id="shared-header-mount" style="background:linear-gradient(135deg,#0c1a3e 0%,#16285e 45%,#1e3a8a 100%);min-height:64px"></div>
    <script src="/js/shared-header.js"></script>

    <!-- Content wrapper -->
    <div class="sd-wrap">
        <!-- Back link -->
        <a href="/songs/" class="sd-back">
            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            Songs &amp; Poems
        </a>

        <!-- Loading State -->
        <div id="loading-state" class="sd-loading">
            <div class="sd-spinner"></div>
            <p>Loading...</p>
        </div>

        <!-- Error State -->
        <div id="error-state" class="sd-error hidden">
            <div class="sd-error-icon">?</div>
            <h2>Entry Not Found</h2>
            <p>We couldn't find the song or poem you're looking for.</p>
            <a href="/songs/" class="sd-error-btn">Back to Songs &amp; Poems</a>
        </div>

        <!-- Song Content -->
        <article id="song-content" class="sd-article hidden">

            <!-- Hero header -->
            <header class="sd-hero">
                <div class="sd-hero-inner">
                    <div class="sd-type-chip" id="sd-type-chip">Song</div>
                    <h1 id="song-title" class="sd-title"></h1>
                    <div class="sd-meta">
                        <p id="song-artist" class="sd-artist"></p>
                        <p id="song-date" class="sd-date"></p>
                    </div>
                </div>
            </header>

            <!-- Overview -->
            <div id="song-overview" class="sd-overview"></div>

            <!-- Video Section -->
            <section id="video-section" class="sd-video-section">
                <div class="sd-section-label">
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    Watch &amp; Listen
                </div>
                <div id="video-container" class="sd-video"></div>
                <a id="youtube-link" href="#" target="_blank" rel="noopener" class="sd-yt-link">
                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                    Open on YouTube
                </a>
            </section>

            <!-- Lyrics / Poem Section -->
            <section id="lyrics-section" class="sd-lyrics-section">
                <div class="sd-section-label">
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                    <span id="lyrics-section-label">Lyrics</span>
                </div>
                <div id="lyrics-container" class="sd-lyrics-container"></div>
            </section>
        </article>
    </div>

    <!-- Footer -->
    <footer class="sd-footer">
        <p>May these songs and poems deepen your faith</p>
        <p class="sd-footer-sub">A Letter in the Scroll</p>
    </footer>

    <script src="/js/shabbat.js"></script>
    <script src="/js/song-detail.js"></script>
    <script src="/js/header-fallback.js"></script>
    <script src="/js/sidebar-nav.js"></script>
    <script src="/js/text-size-control.js"></script>
</body>
</html>
